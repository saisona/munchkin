apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogs:
        datasourceUid: Loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags: ["job", "instance"]
        filterByTraceID: true
        filterBySpanID: true
