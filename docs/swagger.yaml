basePath: /
definitions:
  auth.AuthRequest:
    properties:
      password:
        description: |-
          Password of the user.
          example: strongpassword123
        type: string
      username:
        description: |-
          Username of the user.
          example: alice
        type: string
    type: object
  auth.AuthResponse:
    properties:
      token:
        description: |-
          JWT access token.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  lobbies.LobbyCreationResponse:
    properties:
      error:
        description: |-
          Optional error message when the request fails.
          example: requested lobby not found or game already started
        type: string
      lobby_id:
        description: |-
          Unique lobby identifier.
          example: 7f0f7c90-cf17-4f54-a62f-f6fbc6399d7c
        type: string
    type: object
  lobbies.LobbyListItem:
    properties:
      id:
        description: |-
          Unique lobby identifier.
          example: lobby-1234
        type: string
      name:
        description: |-
          Display name of the lobby.
          example: Casual Game
        type: string
      playerCount:
        description: |-
          Number of players currently in the lobby.
          example: 3
        type: integer
    type: object
  lobbies.LobbyListResponse:
    properties:
      hasMore:
        description: |-
          Indicates whether more items are available.
          example: true
        type: boolean
      items:
        description: List of lobby items.
        items:
          $ref: '#/definitions/lobbies.LobbyListItem'
        type: array
      limit:
        description: |-
          Maximum number of items returned.
          example: 20
        type: integer
      offset:
        description: |-
          Offset used for pagination.
          example: 0
        type: integer
    type: object
host: localhost:1337
info:
  contact: {}
  description: Backend API for the educational Munchkin-inspired card game.
  title: Munchin API
  version: "0.1"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a player using username and password and returns
        a JWT bearer token.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT bearer token
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Malformed request or invalid credentials
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Log in a player
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new player account and returns a JWT bearer token for
        immediate authenticated use.
      parameters:
      - description: Registration credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT bearer token
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Malformed request
          schema:
            type: string
        "409":
          description: Username already taken
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Register a new player
      tags:
      - auth
  /healthz:
    get:
      description: Returns 204 when the API process is alive.
      responses:
        "204":
          description: Process is alive
      summary: Liveness probe
      tags:
      - health
  /lobby:
    get:
      description: Retrieves a paginated lobby list for the lobby selection screen.
      parameters:
      - default: 20
        description: Maximum number of items to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of lobbies
          schema:
            $ref: '#/definitions/lobbies.LobbyListResponse'
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List lobbies
      tags:
      - lobby
    post:
      description: Creates a new lobby for the authenticated player and initializes
        the in-memory game room.
      produces:
      - application/json
      responses:
        "201":
          description: Lobby created
          schema:
            $ref: '#/definitions/lobbies.LobbyCreationResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/lobbies.LobbyCreationResponse'
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create lobby
      tags:
      - lobby
  /lobby/{id}:
    delete:
      description: Deletes a lobby by identifier.
      parameters:
      - description: Lobby ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: When deleting a lobby, a 204 NoContent is received
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Lobby not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete lobby
      tags:
      - lobby
  /lobby/{id}/join:
    post:
      description: Adds the authenticated player to an existing lobby before the game
        starts.
      parameters:
      - description: Lobby ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: Successfully joined the lobby
          schema:
            type: string
        "304":
          description: Player already in lobby
          schema:
            type: string
        "400":
          description: Missing lobby ID or invalid request
          schema:
            type: string
        "404":
          description: Lobby not found
          schema:
            type: string
        "423":
          description: Lobby is full
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Join lobby
      tags:
      - lobby
  /lobby/{id}/start:
    post:
      description: Marks the lobby as started and transitions it into the in-game
        state.
      parameters:
      - description: Lobby ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: Game started
        "400":
          description: Missing lobby ID or invalid lobby
          schema:
            $ref: '#/definitions/lobbies.LobbyCreationResponse'
        "404":
          description: Lobby not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Start lobby game
      tags:
      - lobby
  /lobby/{id}/ws:
    get:
      description: Upgrades the HTTP connection to WebSocket for real-time lobby and
        game events. Authentication currently relies on the JWT provided as the `token`
        query parameter.
      parameters:
      - description: Lobby ID
        in: path
        name: id
        required: true
        type: string
      - description: JWT access token used to authenticate the WebSocket connection
        in: query
        name: token
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "404":
          description: Lobby not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Connect lobby WebSocket
      tags:
      - lobby
  /lobby/model:
    get:
      description: Returns the full lobby collection without pagination. Intended
        mainly for administration or debugging.
      produces:
      - application/json
      responses:
        "200":
          description: List of lobbies
          schema:
            items:
              $ref: '#/definitions/lobbies.LobbyListItem'
            type: array
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all lobbies
      tags:
      - lobby
  /readyz:
    get:
      description: Returns 204 when dependencies are ready to serve traffic, otherwise
        503.
      responses:
        "204":
          description: Dependencies are ready
        "503":
          description: Dependencies are not ready
      summary: Readiness probe
      tags:
      - health
  /startupz:
    get:
      description: Returns 204 when application startup has completed, otherwise 503.
      responses:
        "204":
          description: Application startup completed
        "503":
          description: Application still starting
      summary: Startup probe
      tags:
      - health
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
