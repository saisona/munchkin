basePath: /
definitions:
  lobbies.LobbyListItem:
    properties:
      id:
        type: string
      playerCount:
        type: integer
      state:
        $ref: '#/definitions/lobbies.LobbyState'
    type: object
  lobbies.LobbyListResponse:
    properties:
      hasMore:
        type: boolean
      items:
        items:
          $ref: '#/definitions/lobbies.LobbyListItem'
        type: array
      limit:
        type: integer
      offset:
        type: integer
    type: object
  lobbies.LobbyState:
    enum:
    - ACTIVE
    - FULL
    - IN_GAME
    type: string
    x-enum-varnames:
    - StateAvailable
    - StateFull
    - StateInGame
host: localhost:8080
info:
  contact: {}
  description: This is the API for Munchin game backend
  title: Munchin API
  version: "0.1"
paths:
  /healthz:
    get:
      description: Works as a probe like healhtz check
      responses:
        "200":
          description: OK
      summary: Check health of the service
      tags:
      - healt
  /lobby:
    get:
      description: List all game lobbies based
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/lobbies.LobbyListResponse'
            type: array
      summary: List Lobbies
      tags:
      - lobby
swagger: "2.0"
